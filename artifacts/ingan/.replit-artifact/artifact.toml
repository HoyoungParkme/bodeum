kind = "web"
previewPath = "/"
title = "ingan.ai"
version = "1.0.0"
id = "artifacts/ingan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24943
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ingan run dev"

[services.env]
PORT = "24943"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ingan", "run", "build"]
publicDir = "artifacts/ingan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
